<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="The Fast Life" />
<meta name="theme-color" content="#ffffff" />
<title>The Fast Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,300;9..144,1,400;9..144,1,500;9..144,1,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg-page: #ffffff;
    --bg-card: #faf6f1;
    --bg-card-deep: #f3ece2;
    --bg-stage: #f5f3f0;

    --ink: #3d1d36;
    --ink-soft: #7a5168;
    --ink-faint: #b8a3ae;
    --line: rgba(61, 29, 54, 0.08);
    --line-strong: rgba(61, 29, 54, 0.14);

    --gold: #c9a961;
    --gold-soft: #e0c98a;
    --rose: #d49aa6;
    --rose-soft: #e8c4cd;
    --aub-deep: #5b2547;

    --green: #7a9a6e;
    --green-soft: #d8e3d2;
    --warn: #c0392b;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    font-family: 'Fraunces', Georgia, serif;
    color: var(--ink);
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; min-height: 100dvh; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ─── App container ─── */
  .app {
    min-height: 100vh;
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg-page);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(80px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
    position: relative;
  }

  /* ─── Top bar ─── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px 12px;
  }
  .top-bar-greeting {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .greeting-name {
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.2;
  }
  .greeting-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s ease;
    user-select: none;
  }
  .icon-btn:active { background: var(--bg-card-deep); }

  /* ─── Mode chip ─── */
  .mode-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg-card-deep);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 20px 16px;
  }
  .mode-chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }

  /* ─── Body content area ─── */
  .body-content {
    padding: 0 20px;
  }

  /* ─── Section headers ─── */
  .h-section {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 24px 0 10px 0;
    font-weight: 500;
  }
  .h-section:first-child { margin-top: 0; }

  /* ─── Cards ─── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .card-stage {
    background: linear-gradient(135deg, rgba(201, 169, 97, 0.05), rgba(212, 154, 166, 0.05));
    border: 1px solid rgba(201, 169, 97, 0.18);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }
  .card-action {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  /* ─── Carrie line ─── */
  .carrie-line {
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin: 0;
  }

  /* ─── Form inputs ─── */
  .field { margin-bottom: 18px; }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 16px;
    font-style: italic;
    outline: none;
    transition: all 0.2s ease;
  }
  .input:focus {
    border-color: var(--gold);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.08);
  }

  /* ─── Buttons ─── */
  .btn {
    background: var(--ink);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 16px 36px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 6px 18px rgba(61, 29, 54, 0.18);
    user-select: none;
  }
  .btn:active { background: var(--aub-deep); transform: translateY(1px); }
  .btn-soft {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line-strong);
    box-shadow: none;
  }
  .btn-soft:active { background: var(--bg-card); }
  .btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 16px 0;
  }

  /* ─── Pills / chips ─── */
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
  }
  .chip.active {
    background: linear-gradient(135deg, rgba(201,169,97,0.12), rgba(212,154,166,0.12));
    border-color: var(--gold);
    color: var(--ink);
    font-weight: 500;
  }
  .chip-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* ─── Setup screen ─── */
  .setup-screen {
    min-height: 100vh;
    min-height: 100dvh;
    padding: 40px 24px env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
  }
  .setup-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-align: center;
    margin: 16px 0 4px;
  }
  .setup-title {
    font-style: italic;
    font-weight: 400;
    font-size: 32px;
    color: var(--ink);
    text-align: center;
    margin: 0 0 6px;
    letter-spacing: -0.015em;
  }
  .setup-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
    margin: 0 0 20px;
  }
  .setup-tagline {
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    text-align: center;
    margin: 0 0 32px;
    line-height: 1.5;
  }
  .steps {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 24px;
  }
  .step-dot {
    width: 24px; height: 2px;
    background: var(--line);
    border-radius: 2px;
  }
  .step-dot.active { background: var(--gold); }
  .step-dot.complete { background: var(--ink-soft); }

  /* ─── Mode picker (for setup) ─── */
  .mode-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 8px;
    user-select: none;
  }
  .mode-row.selected {
    background: linear-gradient(135deg, rgba(201, 169, 97, 0.06), rgba(212, 154, 166, 0.06));
    border-color: var(--gold);
  }
  .mode-radio {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-faint);
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s ease;
  }
  .mode-checkbox {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--ink-faint);
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s ease;
  }
  .mode-row.selected .mode-radio,
  .mode-row.selected .mode-checkbox {
    border-color: var(--gold);
    background: var(--gold);
  }
  .mode-row.selected .mode-radio::after {
    content: "";
    position: absolute;
    top: 4px; left: 4px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #fff;
  }
  .mode-row.selected .mode-checkbox::after {
    content: "✓";
    position: absolute;
    top: 0; left: 4px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.4;
  }
  .mode-name {
    font-style: italic;
    font-size: 16px;
    color: var(--ink);
    line-height: 1.2;
  }
  .mode-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    margin-top: 2px;
  }
  .mode-content { flex: 1; min-width: 0; }

  /* ─── Skip link ─── */
  .skip-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    background: transparent;
    border: none;
    padding: 6px 0;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 0.5px;
  }

  /* ─── Footer area ─── */
  .footer-area {
    margin-top: auto;
    padding-top: 20px;
    display: flex;
    justify-content: center;
  }

  /* ─── Timer ring ─── */
  .ring-wrap {
    display: flex;
    justify-content: center;
    margin: 16px 0 24px;
    position: relative;
  }
  .ring-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .ring-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .ring-target {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--gold);
    margin-top: 8px;
    cursor: pointer;
  }
  .ring-target:hover { text-decoration: underline; }

  /* ─── Drinks log tiles ─── */
  .log-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .log-tile {
    aspect-ratio: 1;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    padding: 4px;
    position: relative;
    user-select: none;
  }
  .log-tile:active { background: var(--bg-card); border-color: var(--gold); }
  .log-tile-symbol {
    font-size: 18px;
    line-height: 1;
  }
  .log-tile-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.2;
  }
  .log-tile-count {
    position: absolute;
    top: -4px; right: -4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    background: var(--gold);
    color: #fff;
    width: 14px; height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }

  /* ─── Stage card ─── */
  .stage-headline {
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    margin: 0 0 6px 0;
    line-height: 1.3;
  }
  .stage-carrie {
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin: 0;
  }

  /* ─── Slim window timer (IF in IF+Keto mode) ─── */
  .window-timer {
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, rgba(201,169,97,0.05), rgba(212,154,166,0.05));
    border: 1px solid rgba(201,169,97,0.18);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  /* ─── Macros row ─── */
  .macros-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .macro {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .macro-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .macro-value {
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    line-height: 1;
  }
  .macro-target {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  /* ─── Slider ─── */
  .slider-row { margin-bottom: 14px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .slider-label-name {
    font-style: italic;
    font-size: 14px;
    color: var(--ink);
  }
  .slider-label-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .slider-track {
    display: flex;
    gap: 4px;
    cursor: pointer;
    user-select: none;
  }
  .slider-pip {
    flex: 1;
    height: 8px;
    background: var(--line);
    border-radius: 3px;
    transition: background 0.1s ease;
  }
  .slider-pip.filled {
    background: linear-gradient(90deg, var(--gold), var(--rose));
  }

  /* ─── Supplement row ─── */
  .supp-bucket { margin-bottom: 14px; }
  .supp-bucket:last-child { margin-bottom: 0; }
  .supp-bucket-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .supp-bucket-label .due-now { color: var(--gold); }
  .supp-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
  }
  .supp-row:active { background: var(--bg-card); }
  .supp-row.taken {
    background: var(--green-soft);
    border-color: rgba(122, 154, 110, 0.3);
  }
  .supp-row.skipped { opacity: 0.5; }
  .supp-check {
    width: 22px; height: 22px;
    border: 1.5px solid var(--ink-faint);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: transparent;
  }
  .supp-row.taken .supp-check {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .supp-row.skipped .supp-check {
    background: var(--ink-faint);
    border-color: var(--ink-faint);
    color: #fff;
  }
  .supp-info { flex: 1; min-width: 0; }
  .supp-name {
    font-style: italic;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.2;
  }
  .supp-dose {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    margin-top: 2px;
  }
  .supp-time-stamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faint);
  }

  /* ─── Activity row ─── */
  .activity-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .activity-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .activity-name {
    font-style: italic;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.2;
  }
  .activity-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }
  .activity-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 3px 10px;
    background: var(--bg-card-deep);
    border-radius: 999px;
  }
  .activity-cat.strength { color: var(--aub-deep); background: rgba(91, 37, 71, 0.08); }
  .activity-cat.movement { color: #5a7c52; background: rgba(122, 154, 110, 0.12); }
  .activity-cat.cardio { color: #b66a4a; background: rgba(212, 124, 79, 0.1); }
  .activity-cat.wellness { color: var(--gold); background: rgba(201, 169, 97, 0.1); }

  /* ─── Cycle marker ─── */
  .cycle-marker {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--rose);
    text-transform: uppercase;
  }
  .cycle-marker-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rose);
  }

  /* ─── Modal / sheet ─── */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(61, 29, 54, 0.4);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .sheet {
    background: var(--bg-page);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    border-radius: 24px 24px 0 0;
    padding: 16px 20px env(safe-area-inset-bottom);
    overflow-y: auto;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--line-strong);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title {
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
    margin: 0 0 4px;
  }
  .sheet-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 24px;
  }

const formatTime = (date) => {
  const h = date.getHours();
  const m = date.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
};

const formatDate = (date) => {
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[date.getMonth()]} ${date.getDate()}`;
};

const getCurrentStage = (hours) => {
  let stage = FAST_STAGES[0];
  for (const s of FAST_STAGES) {
    if (s.hour <= hours) stage = s;
    else break;
  }
  return stage;
};

const getCyclePhase = (lastPeriodDate, cycleLength = 28) => {
  if (!lastPeriodDate) return null;
  const last = new Date(lastPeriodDate);
  const today = new Date();
  const days = Math.floor((today - last) / (1000 * 60 * 60 * 24));
  const cycleDay = (days % cycleLength) + 1;
  let phase = "";
  if (cycleDay <= 5) phase = "menstrual";
  else if (cycleDay <= 13) phase = "follicular";
  else if (cycleDay <= 16) phase = "ovulation";
  else if (cycleDay <= 24) phase = "luteal";
  else phase = "late luteal";
  return { day: cycleDay, phase };
};

const greeting = (name) => {
  const h = new Date().getHours();
  let greet = "Hello";
  if (h < 5) greet = "Late night";
  else if (h < 12) greet = "Morning";
  else if (h < 17) greet = "Hello";
  else greet = "Evening";
  return name ? `${greet}, ${name}` : greet;
};

  const updateMacro = (k, v) => setProfile({ ...profile, macroTargets: { ...profile.macroTargets, [k]: v }});

  // Welcome
  if (step === 0) {
    return (
      <div className="setup-screen">
        <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center'}}>
          <div className="setup-mark">◐ ◌ ◐</div>
          <h1 className="setup-title">The Fast Life</h1>
          <p className="setup-sub">Let's begin</p>
          <p className="setup-tagline">A space for the work no one else sees you doing.</p>
        </div>
        <div className="footer-area">
          <button className="btn" onClick={() => setStep(1)}>Begin</button>
        </div>
      </div>
    );
  }

  // The basics
  if (step === 1) {
    const isFemale = profile.sex === "female";
    return (
      <div className="setup-screen">
        <div className="steps">
          <div className="step-dot complete" />
          <div className="step-dot active" />
          <div className="step-dot" />
        </div>

        <h2 className="h-section" style={{marginTop:0}}>The basics</h2>

        <div className="field">
          <div className="field-label">Name (required)</div>
          <input className="input" value={profile.name} onChange={e => update("name", e.target.value)} placeholder="Your name" />
        </div>

        <div className="field">
          <div className="field-label">Sex · for cycle + metabolic defaults</div>
          <div style={{display:'flex', gap:6}}>
            {["female", "male", "skip"].map(s => (
              <div
                key={s}
                className={`mode-row ${profile.sex === s ? 'selected' : ''}`}
                style={{flex:1, padding:'10px 12px', justifyContent:'center'}}
                onClick={() => update("sex", s)}
              >
                <div className="mode-radio" />
                <div className="mode-name" style={{fontSize:13, textTransform:'capitalize'}}>{s}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:18}}>
          <div className="field" style={{margin:0}}>
            <div className="field-label">Date of birth</div>
            <input className="input" type="date" value={profile.dob} onChange={e => update("dob", e.target.value)} />
          </div>
          <div className="field" style={{margin:0}}>
            <div className="field-label">Height (cm)</div>
            <input className="input" type="number" value={profile.height} onChange={e => update("height", parseInt(e.target.value) || 0)} />
          </div>
        </div>

        {isFemale && (
          <div style={{borderTop:'1px solid var(--line)', paddingTop:18}}>
            <h2 className="h-section" style={{marginTop:0}}>Cycle (optional)</h2>

            <div className="field">
              <div className="field-label">Last period start</div>
              <input className="input" type="date" value={profile.lastPeriodDate || ""} onChange={e => update("lastPeriodDate", e.target.value)} />
            </div>

            <div className="field">
              <div className="field-label">Typical cycle length</div>
              <div className="chip-row">
                {[24, 28, 32, 0].map(len => (
                  <div
                    key={len}
                    className={`chip ${profile.cycleLength === len ? 'active' : ''}`}
                    onClick={() => update("cycleLength", len)}
                  >
                    {len === 0 ? "irregular" : len === 24 ? "21-25" : len === 28 ? "26-30" : "31-35"}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        <div className="footer-area">
          <button className="btn" disabled={!profile.name} onClick={() => setStep(2)}>Continue</button>
        </div>
      </div>
    );
  }

  // Protocol
  if (step === 2) {
    const toggleMode = (m) => {
      const exists = profile.modes.includes(m);
      const newModes = exists ? profile.modes.filter(x => x !== m) : [...profile.modes, m];
      update("modes", newModes);
    };

    return (
      <div className="setup-screen">
        <div className="steps">
          <div className="step-dot complete" />
          <div className="step-dot complete" />
          <div className="step-dot active" />
        </div>

        <h2 className="h-section" style={{marginTop:0}}>How you'll use this</h2>

        <div className="field">
          <div className="field-label">Modes · pick what applies</div>
          {[
            { id: "extended", name: "Extended Fast", desc: "24h+ water fasts, full stages" },
            { id: "if", name: "Intermittent Fasting", desc: "Daily eating windows" },
            { id: "keto", name: "Keto", desc: "Meals + macros" },
            { id: "other", name: "Other", desc: "General tracking" }
          ].map(m => (
            <div
              key={m.id}
              className={`mode-row ${profile.modes.includes(m.id) ? 'selected' : ''}`}
              onClick={() => toggleMode(m.id)}
            >
              <div className="mode-checkbox" />
              <div className="mode-content">
                <div className="mode-name">{m.name}</div>
                <div className="mode-desc">{m.desc}</div>
              </div>
            </div>
          ))}
          <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:9.5, color:"var(--ink-faint)", marginTop:8, fontStyle:'italic'}}>
            Pick what applies. Edit anytime in Settings.
          </div>
        </div>

        <h2 className="h-section">Your defaults</h2>

        <div className="field">
          <div className="field-label">Default fast goal (hours)</div>
          <input className="input" type="number" value={profile.defaultFastHours} onChange={e => update("defaultFastHours", parseInt(e.target.value) || 16)} />
        </div>

        <div className="field">
          <div className="field-label">Macro targets · keto mode</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:6}}>
            {["carbs", "protein", "fat"].map(m => (
              <div key={m}>
                <div className="mono" style={{fontSize:8.5, letterSpacing:'0.16em', color:'var(--ink-soft)', marginBottom:4, textTransform:'uppercase'}}>{m}</div>
                <input
                  className="input"
                  type="number"
                  value={profile.macroTargets[m]}
                  onChange={e => updateMacro(m, parseInt(e.target.value) || 0)}
                  style={{padding:'10px 12px', fontSize:14}}
                />
              </div>
            ))}
          </div>
        </div>

        <div className="footer-area">
          <button className="btn" disabled={profile.modes.length === 0} onClick={() => onComplete(profile)}>Begin</button>
        </div>
      </div>
    );
  }

  return null;
}

// HOME SCREEN
// ═══════════════════════════════════════════════════════════════

function HomeScreen({ data, setData, now, setSheet, showToast, setActiveTab }) {
  const { profile, activeFast, drinks, drinkLogs } = data;
  const modes = profile.modes;
  const isExtended = modes.includes("extended");
  const isIF = modes.includes("if");
  const isKeto = modes.includes("keto");
  const isOther = modes.includes("other");

  const cycle = profile.lastPeriodDate ? getCyclePhase(profile.lastPeriodDate, profile.cycleLength || 28) : null;

  // Today's drink count
  const today = todayKey();
  const todayDrinks = drinkLogs.filter(d => d.date === today);
  const drinkCounts = {};
  todayDrinks.forEach(d => { drinkCounts[d.drinkId] = (drinkCounts[d.drinkId] || 0) + 1; });

  // Today's check-in
  const todaysCheckin = data.checkins[today];

  // Today's meals from plan
  const todayDow = dayOfWeek();
  const todayMeals = MEAL_PLAN[todayDow];

  // Today's macros (from logged meals)
  const todayMealLogs = data.meals[today] || [];
  const macros = todayMealLogs.reduce((acc, m) => ({
    carbs: acc.carbs + (m.carbs || 0),
    protein: acc.protein + (m.protein || 0),
    fat: acc.fat + (m.fat || 0)
  }), { carbs: 0, protein: 0, fat: 0 });

  // Supplements today
  const suppLogs = data.supplementLogs[today] || {};
  const totalSupps = data.supplements.length;
  const takenSupps = Object.values(suppLogs).filter(s => s.status === "taken").length;

  const logDrink = (drinkId) => {
    const newLog = { date: today, ts: Date.now(), drinkId };
    setData({ ...data, drinkLogs: [...drinkLogs, newLog] });
  };

  const startFast = (hours) => {
    const newFast = {
      id: Date.now(),
      startedAt: Date.now(),
      goalHours: hours,
      endedAt: null
    };
    setData({ ...data, activeFast: newFast });
    showToast(`Fast begun, ${profile.name}.`);
  };

  const endFast = () => {
    const completed = { ...activeFast, endedAt: Date.now() };
    setData({ ...data, activeFast: null, fastHistory: [...data.fastHistory, completed] });
    showToast("Fast complete. Be gentle with the refeed.");
  };

  // Calculate fast duration
  let fastHours = 0, fastProgress = 0, currentStage = null;
  if (activeFast) {
    const elapsed = (now - activeFast.startedAt) / 1000 / 60 / 60;
    fastHours = elapsed;
    fastProgress = Math.min(100, (elapsed / activeFast.goalHours) * 100);
    currentStage = getCurrentStage(fastHours);
  }

  return (
    <>
      {/* Top bar */}
      <div className="top-bar">
        <div className="top-bar-greeting">
          <div className="greeting-name">{greeting(profile.name)}</div>
          <div className="greeting-meta">{formatDate(new Date()).toUpperCase()} · {todayDow.toUpperCase()}</div>
        </div>
        <div className="icon-btn" onClick={() => setSheet({ type: "settings" })}>⚙</div>
      </div>

      {/* Mode chip */}
      <div className="mode-chip">
        <span className="mode-chip-dot" />
        {modes.includes("extended") && activeFast ? "Extended Fast" :
         modes.length > 1 ? modes.map(m => m === "if" ? "IF" : m === "keto" ? "Keto" : m === "extended" ? "Extended" : "Other").join(" + ") :
         modes[0] === "if" ? "IF" : modes[0] === "keto" ? "Keto" : modes[0] === "extended" ? "Extended Fast" : "Other"}
        {cycle && ` · day ${cycle.day}`}
      </div>

      <div className="body-content">
        {/* Active fast — big ring */}
        {activeFast && (
          <>
            <div className="ring-wrap">
              <svg width="220" height="220" viewBox="0 0 220 220">
                <defs>
                  <linearGradient id="goldRose" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor="#c9a961"/>
                    <stop offset="100%" stopColor="#d49aa6"/>
                  </linearGradient>
                </defs>
                <circle cx="110" cy="110" r="100" fill="none" stroke="var(--line)" strokeWidth="8"/>
                <circle
                  cx="110" cy="110" r="100"
                  fill="none"
                  stroke="url(#goldRose)"
                  strokeWidth="8"
                  strokeLinecap="round"
                  strokeDasharray={2 * Math.PI * 100}
                  strokeDashoffset={2 * Math.PI * 100 - (fastProgress / 100) * 2 * Math.PI * 100}
                  transform="rotate(-90 110 110)"
                />
              </svg>
              <div className="ring-text">
                <div className="ring-time">{Math.floor(fastHours)}:{String(Math.floor((fastHours % 1) * 60)).padStart(2, '0')}</div>
                <div className="ring-label">Hours fasted</div>
                <div className="ring-target" onClick={() => setSheet({ type: "editFast", fast: activeFast })}>
                  → {activeFast.goalHours}h target
                </div>
              </div>
            </div>

            {/* Stage card */}
            {currentStage && (
              <div className="card card-stage">
                <h3 className="stage-headline">{currentStage.headline}</h3>
                <p className="stage-carrie">{currentStage.carrie}</p>
              </div>
            )}

            <div className="btn-row">
              <button className="btn btn-soft" onClick={() => setSheet({ type: "stages" })}>View timeline</button>
              <button className="btn" onClick={() => setSheet({ type: "endFast", onConfirm: endFast })}>Break fast</button>
            </div>
          </>
        )}

        {/* No active fast — start a fast or show window timer */}
        {!activeFast && isExtended && (
          <div className="card card-stage" style={{textAlign:'center', padding:'24px 18px'}}>
            <h3 style={{fontStyle:'italic', fontSize:18, color:'var(--ink)', margin:'0 0 8px'}}>Ready to begin?</h3>
            <p className="carrie-line" style={{margin:'0 0 16px'}}>Tap below to start a fast, darling.</p>
            <button className="btn" onClick={() => setSheet({ type: "startFast", onStart: startFast, defaultHours: profile.defaultFastHours })}>Start fast</button>
          </div>
        )}

        {/* IF + Keto stacked: weight + cycle, macros, supps preview, check-in preview */}
        {(isIF || isKeto) && !activeFast && (
          <>
            {/* Today's weight + cycle */}
            {todaysCheckin?.weight && (
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                <div style={{fontStyle:'italic', fontSize:22, color:'var(--ink)'}}>
                  {todaysCheckin.weight} <span className="mono" style={{fontSize:11, color:'var(--ink-soft)', letterSpacing:'0.15em'}}>KG</span>
                </div>
                {cycle && (
                  <div className="cycle-marker">
                    <span className="cycle-marker-dot" />
                    Day {cycle.day} · {cycle.phase}
                  </div>
                )}
              </div>
            )}

            {/* Macros */}
            {isKeto && (
              <div className="card">
                <div className="card-header">
                  <div className="card-title">Today · macros</div>
                  <div className="card-action" onClick={() => setSheet({ type: "logMeal" })}>log meal</div>
                </div>
                <div className="macros-row">
                  {["carbs", "protein", "fat"].map(m => (
                    <div key={m} className="macro">
                      <div className="macro-name">{m}</div>
                      <div className="macro-value">{macros[m]}</div>
                      <div className="macro-target">/ {profile.macroTargets[m]}g</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        )}

        {/* Drinks */}
        <div className="card">
          <div className="card-header">
            <div className="card-title">Drinks · today</div>
            <div className="card-action" onClick={() => setSheet({ type: "editDrinks" })}>edit</div>
          </div>
          <div className="log-grid">
            {drinks.map(d => (
              <div key={d.id} className="log-tile" onClick={() => logDrink(d.id)}>
                {drinkCounts[d.id] > 0 && <div className="log-tile-count">{drinkCounts[d.id]}</div>}
                <div className="log-tile-symbol">{d.symbol}</div>
                <div className="log-tile-label">{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Supplements summary */}
        <div className="card" onClick={() => setActiveTab("supps")} style={{cursor:'pointer'}}>
          <div className="card-header">
            <div className="card-title">Supplements · {takenSupps} of {totalSupps}</div>
            <div className="card-action">view all ›</div>
          </div>
          <div style={{fontStyle:'italic', fontSize:13, color:'var(--ink-soft)', lineHeight:1.5}}>
            {takenSupps === totalSupps ? "Stack complete for today, beautifully done." :
             takenSupps === 0 ? "Stack ready when you are." :
             `${totalSupps - takenSupps} items pending.`}
          </div>
        </div>

        {/* Daily check-in summary */}
        <div className="card">
          <div className="card-header">
            <div className="card-title">{todaysCheckin ? "Today's check-in" : "Daily check-in"}</div>
            <div className="card-action" onClick={() => setSheet({ type: "checkin" })}>{todaysCheckin ? "edit" : "add"}</div>
          </div>
          {todaysCheckin ? (
            <div style={{fontStyle:'italic', fontSize:13, color:'var(--ink-soft)', lineHeight:1.5}}>
              Weight {todaysCheckin.weight} · Sleep {todaysCheckin.sliders?.sleep || "—"}/10 · Energy {todaysCheckin.sliders?.energy || "—"}/10
            </div>
          ) : (
            <div style={{fontStyle:'italic', fontSize:13, color:'var(--ink-soft)', lineHeight:1.5}}>
              How was today? Tap to log.
            </div>
          )}
        </div>

        {/* Today's meals (Keto mode) */}
        {isKeto && todayMeals && (
          <div className="card">
            <div className="card-header">
              <div className="card-title">Today's meals · {todayDow}</div>
              <div className="card-action" onClick={() => setActiveTab("diet")}>view ›</div>
            </div>
            <div style={{padding:'6px 0', borderBottom:'1px solid var(--line)'}}>
              <div className="mono" style={{fontSize:9, letterSpacing:'0.18em', color:'var(--ink-soft)', textTransform:'uppercase', marginBottom:2}}>Lunch</div>
              <div style={{fontStyle:'italic', fontSize:14, color:'var(--ink)'}}>{todayMeals.lunch}</div>
            </div>
            <div style={{padding:'6px 0'}}>
              <div className="mono" style={{fontSize:9, letterSpacing:'0.18em', color:'var(--ink-soft)', textTransform:'uppercase', marginBottom:2}}>Dinner</div>
              <div style={{fontStyle:'italic', fontSize:14, color:'var(--ink)'}}>{todayMeals.dinner}</div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// SUPPLEMENTS SCREEN
// ═══════════════════════════════════════════════════════════════

function SupplementsScreen({ data, setData, setSheet, showToast }) {
  const today = todayKey();
  const todayDow = dayOfWeek();
  const todayLogs = data.supplementLogs[today] || {};

  const isCycledDay = ["Mon","Wed","Fri"].includes(todayDow);
  const totalToday = data.supplements.length + (isCycledDay ? data.cycledSupplements.length : 0);
  const takenCount = Object.values(todayLogs).filter(s => s.status === "taken").length;

  // Group supplements by bucket
  const byBucket = {};
  data.supplements.forEach(s => {
    if (!byBucket[s.bucket]) byBucket[s.bucket] = [];
    byBucket[s.bucket].push(s);
  });

  // Add cycled to "morning" bucket if today is M/W/F
  const cycledForToday = isCycledDay ? data.cycledSupplements : [];

  const toggleSupp = (suppId) => {
    const current = todayLogs[suppId];
    const newStatus = current?.status === "taken" ? null : "taken";
    const newLogs = { ...todayLogs };
    if (newStatus === null) {
      delete newLogs[suppId];
    } else {
      newLogs[suppId] = {
        status: "taken",
        time: new Date().toTimeString().slice(0, 5)
      };
    }
    setData({ ...data, supplementLogs: { ...data.supplementLogs, [today]: newLogs } });
  };

  // Identify "due now" bucket based on time
  const currentHour = new Date().getHours();
  const dueNowBucket =
    currentHour < 7 ? "waking" :
    currentHour < 8 ? "morning" :
    currentHour < 11 ? "midmorning" :
    currentHour < 14 ? "lunch" :
    currentHour < 17 ? "afternoon" :
    currentHour < 19 ? "dinner" :
    currentHour < 21 ? "evening" :
    "night";

  return (
    <>
      <div className="top-bar">
        <div className="top-bar-greeting">
          <div className="greeting-name">Supplements</div>
          <div className="greeting-meta">{takenCount} OF {totalToday} TODAY</div>
        </div>
        <div className="icon-btn" onClick={() => setSheet({ type: "editSupps" })}>⚙</div>
      </div>

      <div className="body-content">
        {Object.keys(BUCKET_LABELS).map(bucket => {
          const items = byBucket[bucket] || [];
          const showCycled = bucket === "morning" && cycledForToday.length > 0;
          if (items.length === 0 && !showCycled) return null;
          const info = BUCKET_LABELS[bucket];
          const isDueNow = bucket === dueNowBucket;

          return (
            <div key={bucket} className="supp-bucket">
              <div className="supp-bucket-label">
                <span>{info.label}</span>
                <span className={isDueNow ? "due-now" : ""}>{isDueNow ? "due now" : info.time}</span>
              </div>
              {items.map(s => {
                const log = todayLogs[s.id];
                const isTaken = log?.status === "taken";
                return (
                  <div key={s.id} className={`supp-row ${isTaken ? 'taken' : ''}`} onClick={() => toggleSupp(s.id)}>
                    <div className="supp-check">{isTaken ? "✓" : ""}</div>
                    <div className="supp-info">
                      <div className="supp-name">{s.name}</div>
                      <div className="supp-dose">{s.dose}{s.warning && " · ⚠"}</div>
                    </div>
                    {isTaken && log.time && <div className="supp-time-stamp">{log.time}</div>}
                  </div>
                );
              })}
              {showCycled && cycledForToday.map(s => {
                const log = todayLogs[s.id];
                const isTaken = log?.status === "taken";
                return (
                  <div key={s.id} className={`supp-row ${isTaken ? 'taken' : ''}`} onClick={() => toggleSupp(s.id)}>
                    <div className="supp-check">{isTaken ? "✓" : ""}</div>
                    <div className="supp-info">
                      <div className="supp-name">{s.name} <span className="mono" style={{fontSize:9, color:'var(--gold)', marginLeft:4, letterSpacing:'0.1em'}}>· M/W/F</span></div>
                      <div className="supp-dose">{s.dose}</div>
                    </div>
                    {isTaken && log.time && <div className="supp-time-stamp">{log.time}</div>}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </>
  );
}

function WeightChart({ history }) {
  if (history.length < 2) {
    return <div style={{fontSize:11, color:'var(--ink-faint)', fontStyle:'italic', textAlign:'center', padding:20}}>Need at least 2 weight logs to show a chart.</div>;
  }
  const weights = history.map(h => h.weight);
  const min = Math.min(...weights);
  const max = Math.max(...weights);
  const range = max - min || 1;
  const w = 280;
  const h = 80;
  const points = history.map((p, i) => {
    const x = (i / (history.length - 1)) * w;
    const y = h - ((p.weight - min) / range) * (h - 10) - 5;
    return `${x},${y}`;
  }).join(" ");
  const lastPoint = history[history.length - 1];
  const lastX = w;
  const lastY = h - ((lastPoint.weight - min) / range) * (h - 10) - 5;

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%', height:80, display:'block'}}>
      <defs>
        <linearGradient id="wtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="rgba(201,169,97,0.18)"/>
          <stop offset="100%" stopColor="rgba(201,169,97,0)"/>
        </linearGradient>
      </defs>
      <polyline points={points + ` ${w},${h} 0,${h}`} fill="url(#wtGrad)" />
      <polyline points={points} fill="none" stroke="#c9a961" strokeWidth="1.6" />
      <circle cx={lastX} cy={lastY} r="4" fill="#d49aa6" />
    </svg>
  );
}

// ─── Daily Check-in ──────────────────────────────────────────
function CheckinSheet({ data, setData, setSheet, showToast }) {
  const today = todayKey();
  const existing = data.checkins[today] || {};

  const [weight, setWeight] = useState(existing.weight || "");
  const [bedtime, setBedtime] = useState(existing.sleep?.bedtime || "");
  const [wakeTime, setWakeTime] = useState(existing.sleep?.wakeTime || "");
  const [rested, setRested] = useState(existing.sleep?.rested || null);
  const [meditated, setMeditated] = useState(existing.meditation?.did || false);
  const [medDuration, setMedDuration] = useState(existing.meditation?.duration || 10);
  const [sliders, setSliders] = useState(existing.sliders || {
    energy: 7, sleep: 7, mood: 7, cravings: 3, bloat: 3
  });
  const [note, setNote] = useState(existing.note || "");

  // Calculate sleep hours
  const calcHours = () => {
    if (!bedtime || !wakeTime) return null;
    const [bh, bm] = bedtime.split(":").map(Number);
    const [wh, wm] = wakeTime.split(":").map(Number);
    let hours = (wh + wm/60) - (bh + bm/60);
    if (hours < 0) hours += 24;
    return hours.toFixed(1);
  };
  const sleepHours = calcHours();

  const save = () => {
    const checkin = {
      ts: Date.now(),
      weight: weight ? parseFloat(weight) : null,
      sleep: { bedtime, wakeTime, hours: sleepHours, rested },
      meditation: { did: meditated, duration: meditated ? medDuration : 0 },
      sliders,
      note
    };
    setData({ ...data, checkins: { ...data.checkins, [today]: checkin } });
    showToast("Saved, beautifully done.");
    setSheet(null);
  };

  return (
    <>
      <h2 className="sheet-title">Daily check-in</h2>
      <div className="sheet-sub">{formatDate(new Date())}</div>

      <p className="carrie-line" style={{textAlign:'left', marginBottom:20}}>A few quick reads. Then we move on.</p>

      <div className="field">
        <div className="field-label">Weight (kg)</div>
        <input className="input" type="number" step="0.1" value={weight} onChange={e => setWeight(e.target.value)} placeholder="62.4" />
      </div>

      <h3 className="h-section">Sleep last night</h3>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
        <div className="field" style={{margin:0}}>
          <div className="field-label" style={{marginBottom:4}}>Bedtime</div>
          <input className="input" type="time" value={bedtime} onChange={e => setBedtime(e.target.value)} style={{padding:'10px 12px', fontSize:14}} />
        </div>
        <div className="field" style={{margin:0}}>
          <div className="field-label" style={{marginBottom:4}}>Wake</div>
          <input className="input" type="time" value={wakeTime} onChange={e => setWakeTime(e.target.value)} style={{padding:'10px 12px', fontSize:14}} />
        </div>
      </div>
      {sleepHours && (
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 12px', background:'var(--bg-card)', border:'1px solid var(--line)', borderRadius:10, marginBottom:18}}>
          <div>
            <span style={{fontStyle:'italic', fontSize:18, color:'var(--ink)'}}>{sleepHours}</span>
            <span className="mono" style={{fontSize:10, color:'var(--ink-soft)', letterSpacing:'0.12em', marginLeft:4}}>HOURS</span>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span className="mono" style={{fontSize:9, letterSpacing:'0.16em', color:'var(--ink-soft)', textTransform:'uppercase'}}>Rested?</span>
            <div style={{display:'flex', gap:4}}>
              <div className={`chip ${rested === true ? 'active' : ''}`} onClick={() => setRested(true)}>Yes</div>
              <div className={`chip ${rested === false ? 'active' : ''}`} onClick={() => setRested(false)}>No</div>
            </div>
          </div>
        </div>
      )}

      <h3 className="h-section">Meditation</h3>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 12px', background:'var(--bg-card)', border:'1px solid var(--line)', borderRadius:10, marginBottom:18}}>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <div
            style={{
              width:18, height:18, borderRadius:4,
              background: meditated ? 'var(--green)' : 'transparent',
              border: `1.5px solid ${meditated ? 'var(--green)' : 'var(--ink-faint)'}`,
              display:'flex', alignItems:'center', justifyContent:'center',
              color:'#fff', fontSize:11, cursor:'pointer'
            }}
            onClick={() => setMeditated(!meditated)}
          >{meditated ? "✓" : ""}</div>
          <span style={{fontStyle:'italic', fontSize:14, color:'var(--ink)'}}>Sat today</span>
        </div>
        {meditated && (
          <div style={{display:'flex', gap:4}}>
            {[5, 10, 15, 20].map(d => (
              <div key={d} className={`chip ${medDuration === d ? 'active' : ''}`} onClick={() => setMedDuration(d)}>{d}</div>
            ))}
          </div>
        )}
      </div>

      <h3 className="h-section">How was today</h3>
      <div className="card">
        {[
          { key: 'energy', name: 'Energy' },
          { key: 'sleep', name: 'Sleep quality' },
          { key: 'mood', name: 'Mood' },
          { key: 'cravings', name: 'Cravings' },
          { key: 'bloat', name: 'Bloat' }
        ].map(s => (
          <SliderRow
            key={s.key}
            name={s.name}
            value={sliders[s.key]}
            onChange={v => setSliders({ ...sliders, [s.key]: v })}
          />
        ))}
      </div>

      <div className="field" style={{marginTop:18}}>
        <div className="field-label">A note (optional)</div>
        <textarea
          className="input"
          rows="2"
          value={note}
          onChange={e => setNote(e.target.value)}
          placeholder="how does today feel..."
          style={{resize:'none'}}
        />
      </div>

      <div className="footer-area" style={{paddingTop:0}}>
        <button className="btn" onClick={save}>Save check-in</button>
      </div>
    </>
  );
}

// ─── Stages Timeline ─────────────────────────────────────────
function StagesSheet({ data }) {
  const fast = data.activeFast;
  const elapsedHours = fast ? (Date.now() - fast.startedAt) / 1000 / 60 / 60 : 0;

  return (
    <>
      <h2 className="sheet-title">The 36 stages</h2>
      <div className="sheet-sub">What happens, hour by hour</div>

      <div style={{maxHeight:'70vh', overflowY:'auto', paddingRight:8}}>
        {FAST_STAGES.map((s, i) => {
          const passed = elapsedHours >= s.hour;
          const current = passed && (i === FAST_STAGES.length - 1 || elapsedHours < FAST_STAGES[i+1]?.hour);
          return (
            <div
              key={s.hour}
              className={`card ${current ? 'card-stage' : ''}`}
              style={{
                marginBottom: 10,
                opacity: passed ? 1 : 0.5,
                padding: '12px 14px'
              }}
            >
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4}}>
                <h4 style={{fontStyle:'italic', fontSize:15, color:'var(--ink)', margin:0}}>{s.headline}</h4>
                <span className="mono" style={{fontSize:9, color: current ? 'var(--gold)' : 'var(--ink-soft)', letterSpacing:'0.16em', fontWeight: current ? 600 : 400}}>{s.hour}H</span>
              </div>
              <p style={{fontStyle:'italic', fontSize:12, color:'var(--ink-soft)', margin:0, lineHeight:1.5}}>{s.carrie}</p>
            </div>
          );
        })}
      </div>
    </>
  );
}

// ─── Bloodwork ───────────────────────────────────────────────
function BloodworkSheet({ data, setData, setSheet }) {
  const tests = data.bloodwork;
  const allMarkers = {};

  // Collect all markers across tests
  tests.forEach(t => {
    Object.keys(t.panel).forEach(panel => {
      if (!allMarkers[panel]) allMarkers[panel] = new Set();
      Object.keys(t.panel[panel]).forEach(m => allMarkers[panel].add(m));
    });
  });

  const markerLabels = {
    tsh: "TSH", ft3: "Free T3", ft4: "Free T4",
    ldl: "LDL", hdl: "HDL", triglycerides: "Triglycerides", totalCholesterol: "Total Cholesterol", apoB: "ApoB", lpa: "Lp(a)",
    glucose: "Glucose · F", hba1c: "HbA1c", insulin: "Insulin · F",
    d: "Vitamin D", b12: "B12", folate: "Folate", ferritin: "Ferritin",
    hsCRP: "hs-CRP", ige: "IgE"
  };

  const panelLabels = {
    thyroid: "Thyroid", lipids: "Lipids", metabolic: "Metabolic",
    vitamins: "Vitamins", inflammation: "Inflammation"
  };

  const cellClass = (panel, marker, value) => {
    if (value === null || value === undefined) return 'bw-cell-empty';
    const ranges = {
      tsh: { high: 4 }, ft3: { low: 2.0 }, ft4: { low: 0.9 },
      ldl: { high: 130 }, hdl: { low: 40 }, triglycerides: { high: 150 },
      totalCholesterol: { high: 200 }, apoB: { high: 100 }, lpa: { high: 30 },
      glucose: { high: 100 }, hba1c: { high: 5.7 },
      d: { low: 30 }, b12: { low: 200 }, folate: { low: 4 }, ferritin: { low: 30 }
    };
    const r = ranges[marker];
    if (!r) return '';
    if (r.high && value > r.high) return 'bw-cell-high';
    if (r.low && value < r.low) return 'bw-cell-low';
    return 'bw-cell-good';
  };

  return (
    <>
      <h2 className="sheet-title">Bloodwork</h2>
      <div className="sheet-sub">{tests.length} {tests.length === 1 ? 'test' : 'tests'} logged</div>

      <p className="carrie-line" style={{textAlign:'left', marginBottom:16, fontSize:12}}>Watch the trends. The numbers tell the truer story.</p>

      <div style={{overflowX:'auto', marginBottom:14}}>
        <table className="bw-table">
          <thead>
            <tr>
              <th>Marker</th>
              {tests.map(t => <th key={t.date}>{t.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {Object.keys(allMarkers).map(panel => (
              <React.Fragment key={panel}>
                <tr className="bw-section-row">
                  <td colSpan={tests.length + 1}>{panelLabels[panel] || panel}</td>
                </tr>
                {[...allMarkers[panel]].map(m => (
                  <tr key={m}>
                    <td>{markerLabels[m] || m}</td>
                    {tests.map(t => {
                      const v = t.panel[panel]?.[m];
                      return <td key={t.date} className={cellClass(panel, m, v)}>{v ?? '—'}</td>;
                    })}
                  </tr>
                ))}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      <div className="card" style={{padding:'10px 14px', textAlign:'center'}}>
        <div className="mono" style={{fontSize:9, letterSpacing:'0.05em', color:'var(--ink-soft)'}}>
          <span style={{color:'var(--warn)'}}>● out of range</span>{' '}
          <span style={{color:'var(--green)'}}>● optimal</span>{' '}
          <span>● in range</span>{' '}
          <span style={{color:'var(--ink-faint)'}}>— not yet</span>
        </div>
      </div>

      <p style={{fontSize:11, color:'var(--ink-faint)', textAlign:'center', fontStyle:'italic', margin:'14px 0'}}>
        Full reports live in your Files. Adding new test results coming soon.
      </p>
    </>
  );
}

// ─── Period Tracker ──────────────────────────────────────────
function PeriodSheet({ data, setData, setSheet, showToast }) {
  const [date, setDate] = useState(data.profile.lastPeriodDate || todayKey());

  const save = () => {
    setData({
      ...data,
      profile: { ...data.profile, lastPeriodDate: date },
      periods: [...data.periods, { start: date }]
    });
    showToast("Period date saved.");
    setSheet(null);
  };

  const cycle = getCyclePhase(data.profile.lastPeriodDate, data.profile.cycleLength || 28);

  return (
    <>
      <h2 className="sheet-title">Cycle</h2>
      <div className="sheet-sub">Quietly noted</div>

      {cycle && (
        <div className="card card-stage" style={{textAlign:'center', marginBottom:18}}>
          <div className="mono" style={{fontSize:10, letterSpacing:'0.2em', color:'var(--gold)', textTransform:'uppercase'}}>
            DAY {cycle.day} · {cycle.phase}
          </div>
        </div>
      )}

      <div className="field">
        <div className="field-label">Last period start</div>
        <input className="input" type="date" value={date} onChange={e => setDate(e.target.value)} />
      </div>

      <div className="footer-area" style={{paddingTop:0}}>
        <button className="btn" onClick={save}>Save</button>
      </div>
    </>
  );
}

// ─── Fast History ────────────────────────────────────────────
function FastHistorySheet({ data }) {
  if (data.fastHistory.length === 0) {
    return (
      <>
        <h2 className="sheet-title">Fast history</h2>
        <div className="sheet-sub">No completed fasts yet</div>
        <div className="empty-state" style={{padding:'40px 20px'}}>
          <div className="empty-state-line">Your first fast will appear here when complete.</div>
        </div>
      </>
    );
  }

  return (
    <>
      <h2 className="sheet-title">Fast history</h2>
      <div className="sheet-sub">{data.fastHistory.length} completed</div>

      {data.fastHistory.slice().reverse().map(f => {
        const start = new Date(f.startedAt);
        const end = new Date(f.endedAt);
        const hours = ((f.endedAt - f.startedAt) / 1000 / 60 / 60).toFixed(1);
        return (
          <div key={f.id} className="card" style={{padding:'12px 14px'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4}}>
              <div style={{fontStyle:'italic', fontSize:16, color:'var(--ink)'}}>{hours} hours</div>
              <div className="mono" style={{fontSize:9, color:'var(--ink-soft)', letterSpacing:'0.1em'}}>{f.goalHours}H GOAL</div>
            </div>
            <div className="mono" style={{fontSize:10, color:'var(--ink-faint)', letterSpacing:'0.05em'}}>
              {formatDate(start)} → {formatDate(end)}
            </div>
          </div>
        );
      })}
    </>
  );
}

// ─── Settings ────────────────────────────────────────────────
function SettingsSheet({ data, setData, setSheet, showToast }) {
  const [editing, setEditing] = useState(null);
  const profile = data.profile;

  const updateProfile = (k, v) => {
    setData({ ...data, profile: { ...profile, [k]: v }});
  };

  const updateMacro = (m, v) => {
    setData({ ...data, profile: { ...profile, macroTargets: { ...profile.macroTargets, [m]: parseInt(v) || 0 }}});
  };

  const toggleMode = (m) => {
    const exists = profile.modes.includes(m);
    const newModes = exists ? profile.modes.filter(x => x !== m) : [...profile.modes, m];
    updateProfile("modes", newModes);
  };

  const reset = () => {
    if (confirm("Reset all data? This cannot be undone.")) {
      localStorage.removeItem(STORAGE_KEY);
      window.location.reload();
    }
  };

  return (
    <>
      <h2 className="sheet-title">Settings</h2>
      <div className="sheet-sub">Everything is editable</div>

      <h3 className="h-section">You</h3>
      <div className="card" style={{padding:0}}>
        <div className="settings-row" style={{padding:'14px 18px'}} onClick={() => setEditing("name")}>
          <span className="settings-label">Name</span>
          <span className="settings-value">{profile.name}<span className="settings-arrow">›</span></span>
        </div>
        <div className="settings-row" style={{padding:'14px 18px'}}>
          <span className="settings-label">Sex</span>
          <span className="settings-value" style={{textTransform:'capitalize'}}>{profile.sex}</span>
        </div>
        <div className="settings-row" style={{padding:'14px 18px'}}>
          <span className="settings-label">DOB</span>
          <span className="settings-value">{profile.dob}</span>
        </div>
        <div className="settings-row" style={{padding:'14px 18px'}}>
          <span className="settings-label">Height</span>
          <span className="settings-value">{profile.height} cm</span>
        </div>
      </div>

      <h3 className="h-section">Modes (multi-select)</h3>
      <div className="card" style={{padding:0}}>
        {[
          { id: "extended", name: "Extended Fast" },
          { id: "if", name: "Intermittent Fasting" },
          { id: "keto", name: "Keto" },
          { id: "other", name: "Other" }
        ].map(m => (
          <div key={m.id} className="settings-row" style={{padding:'14px 18px', cursor:'pointer'}} onClick={() => toggleMode(m.id)}>
            <span className="settings-label">{m.name}</span>
            <span className="settings-value">{profile.modes.includes(m.id) ? "✓" : ""}</span>
          </div>
        ))}
      </div>

      <h3 className="h-section">Macro targets</h3>
      <div className="card">
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8}}>
          {["carbs","protein","fat"].map(m => (
            <div key={m}>
              <div className="mono" style={{fontSize:8.5, letterSpacing:'0.16em', color:'var(--ink-soft)', marginBottom:4, textTransform:'uppercase'}}>{m}</div>
              <input className="input" type="number" value={profile.macroTargets[m]} onChange={e => updateMacro(m, e.target.value)} style={{padding:'10px 12px', fontSize:14}} />
            </div>
          ))}
        </div>
      </div>

      <h3 className="h-section">Fast goal default</h3>
      <div className="card">
        <input
          className="input"
          type="number"
          value={profile.defaultFastHours}
          onChange={e => updateProfile("defaultFastHours", parseInt(e.target.value) || 16)}
        />
      </div>

      <h3 className="h-section">Cycle</h3>
      <div className="card" style={{padding:0}}>
        <div className="settings-row" style={{padding:'14px 18px'}} onClick={() => setSheet({ type: "period" })}>
          <span className="settings-label">Last period date</span>
          <span className="settings-value">{profile.lastPeriodDate || "—"}<span className="settings-arrow">›</span></span>
        </div>
        <div className="settings-row" style={{padding:'14px 18px'}}>
          <span className="settings-label">Cycle length</span>
          <span className="settings-value">{profile.cycleLength || 28} days</span>
        </div>
      </div>

      <h3 className="h-section">Customize</h3>
      <div className="card" style={{padding:0}}>
        <div className="settings-row" style={{padding:'14px 18px'}} onClick={() => setSheet({ type: "editDrinks" })}>
          <span className="settings-label">Drinks</span>
          <span className="settings-value">{data.drinks.length} types<span className="settings-arrow">›</span></span>
        </div>
        <div className="settings-row" style={{padding:'14px 18px'}} onClick={() => setSheet({ type: "editSupps" })}>
          <span className="settings-label">Supplement stack</span>
          <span className="settings-value">{data.supplements.length} items<span className="settings-arrow">›</span></span>
        </div>
      </div>

      <h3 className="h-section">Data</h3>
      <div className="card" style={{padding:0}}>
        <div className="settings-row" style={{padding:'14px 18px'}} onClick={() => setSheet({ type: "exportData" })}>
          <span className="settings-label">Export my data</span>
          <span className="settings-arrow">›</span>
        </div>
        <div className="settings-row" style={{padding:'14px 18px', color:'var(--rose)'}} onClick={reset}>
          <span className="settings-label" style={{color:'var(--rose)'}}>Reset everything</span>
          <span className="settings-arrow">›</span>
        </div>
      </div>
    </>
  );
}

// ─── Day Meals ───────────────────────────────────────────────

// ─── Export Data ─────────────────────────────────────────────
function ExportDataSheet({ data, showToast, setSheet }) {
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `the-fast-life-${todayKey()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Data exported.");
  };

  return (
    <>
      <h2 className="sheet-title">Export data</h2>
      <div className="sheet-sub">JSON backup of everything</div>

      <p className="carrie-line" style={{textAlign:'left', marginBottom:20, fontSize:13}}>
        Your data lives in your browser. This downloads a backup file you can save somewhere safe — iCloud, email to yourself, anywhere.
      </p>

      <div className="footer-area" style={{paddingTop:0}}>
        <button className="btn" onClick={exportJSON}>Download backup</button>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppWithSheets />);
</script>
</body>
